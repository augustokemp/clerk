
services:
  api:
    build: .
    env_file: .env
    environment:
        POSTGRES_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./app:/app
    command: uvicorn api:app --host 0.0.0.0 --port 8000

  db:
    image: "pgvector/pgvector:pg16"
    ports:
    - "5432:5432"
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    volumes:
    - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: